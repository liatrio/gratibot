name: "Prod"
on:
  release:
    types: [created]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/gratibot
  IMAGE_PATH: ${{ github.repository_owner }}/gratibot

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  promote:
    name: "Promote image from nonprod"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Resolve nonprod sha_short
        id: source
        run: echo "sha_short=$(git rev-parse --short ${{ github.sha }})" >> $GITHUB_OUTPUT

      - name: Generate tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/*/}" >> $GITHUB_OUTPUT

      - name: Log into registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Promote image
        run: docker buildx imagetools create -t $IMAGE_NAME:${{ steps.tag.outputs.tag }} $IMAGE_NAME:${{ steps.source.outputs.sha_short }}
    outputs:
      docker_tag: ${{ steps.tag.outputs.tag }}
      source_tag: ${{ steps.source.outputs.sha_short }}
  plan:
    name: "Terraform Prod plan"
    runs-on: ubuntu-latest
    concurrency:
      group: "tf-prod"
    # 'plan' scopes OIDC to a read-only Azure identity, distinct from the elevated identity used by the 'prod' environment.
    environment:
      name: "plan"
    needs: promote
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install OpenTofu and Terragrunt
        uses: gruntwork-io/terragrunt-action@ad66bd184abd991249047d1f61bce1f29aaed2a6 # v3.3.0
      - name: Plan Gratibot prod deployment
        working-directory: infra/terragrunt/prod/gratibot/
        shell: bash
        run: |
          set -eo pipefail
          terragrunt plan -no-color -out="$PWD/tfplan" 2>&1 | tee plan.txt
          {
            echo "## Terraform plan for prod"
            echo ""
            echo '```terraform'
            cat plan.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_PROD_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
          TF_VAR_gratibot_image: "${{ env.IMAGE_PATH }}:${{ needs.promote.outputs.docker_tag }}"
      - name: Upload plan artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tfplan
          path: infra/terragrunt/prod/gratibot/tfplan
          retention-days: 7
          if-no-files-found: error
  apply:
    name: "Terraform Prod Apply"
    runs-on: ubuntu-latest
    concurrency:
      group: "tf-prod"
    environment:
      name: "prod"
    needs: [promote, plan]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install OpenTofu and Terragrunt
        uses: gruntwork-io/terragrunt-action@ad66bd184abd991249047d1f61bce1f29aaed2a6 # v3.3.0
      - name: Download plan artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tfplan
          path: infra/terragrunt/prod/gratibot/
      - name: Deploy Gratibot to Prod
        working-directory: infra/terragrunt/prod/gratibot/
        run: |
          terragrunt apply --non-interactive "$PWD/tfplan"
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_PROD_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: true
          TF_VAR_gratibot_image: "${{ env.IMAGE_PATH }}:${{ needs.promote.outputs.docker_tag }}"
