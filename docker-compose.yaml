services:
  gratibot:
    container_name: gratibot
    depends_on:
      - mongodb
    ports:
      - 3000:3000
    build: .
    environment:
      - BOT_USER_OAUTH_ACCESS_TOKEN
      - APP_TOKEN
      - RECOGNIZE_EMOJI
      - REACTION_EMOJI
      - EXEMPT_USERS
      - MONGO_URL=mongodb://mongodb:27017/gratibot
      - LOG_LEVEL
      - GRATIBOT_LIMIT
      - GOLDEN_RECOGNIZE_EMOJI
      - GOLDEN_RECOGNIZE_CHANNEL
      - GOLDEN_RECOGNIZE_HOLDER
      - REDEMPTION_ADMINS
      - BOT_NAME
      - SLASH_COMMAND
    develop:
      watch:
        - action: sync+restart
          path: .
          target: /app
          ignore:
            - node_modules/
            - test/
            - docs/
            - infra/
            - .git/
            - .github/
            - .husky/
            - coverage/
        - action: rebuild
          path: package.json
        - action: rebuild
          path: package-lock.json
        - action: rebuild
          path: Dockerfile
  mongodb:
    ports:
      - 27017:27017
    image: mongo:8.3
